<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>八字排盘</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="product-topbar">
        <div class="product-brand">
          <div class="mini-seal">命</div>
          <div>
            <strong>八字排盘工作台</strong>
            <span>咨询服务工作台</span>
          </div>
        </div>
        <nav class="product-nav" aria-label="产品模块">
          <button class="nav-item active" type="button" data-module="workbench">工作台</button>
          <button class="nav-item" type="button" data-module="ziwei">紫微</button>
          <button class="nav-item" type="button" data-module="cases">案例</button>
          <button class="nav-item" type="button" data-module="reports">报告</button>
          <button class="nav-item" type="button" data-module="knowledge">知识库</button>
          <button class="nav-item" type="button" data-module="settings">设置</button>
        </nav>
        <div class="product-actions">
          <span>本机保存</span>
          <button id="backup-shortcut" class="secondary compact-action" type="button">备份数据</button>
        </div>
      </header>
      <section class="workspace">
        <aside class="control-panel">
          <div class="brand-mark">
            <div class="seal">命</div>
            <div>
              <h1>八字排盘</h1>
              <p>四柱 · 流运 · 关系 · 报告 · 案例</p>
            </div>
          </div>

          <section class="sidebar-section">
            <div class="section-title">
              <span>01</span>
              <strong>命盘建档</strong>
            </div>
          </section>

          <form id="bazi-form">
            <label>
              <span>姓名或备注</span>
              <input name="personName" type="text" placeholder="可选" />
            </label>

            <label>
              <span>性别</span>
              <select name="gender">
                <option value="unknown" selected>暂不填写</option>
                <option value="male">男</option>
                <option value="female">女</option>
              </select>
            </label>

            <label>
              <span>日期类型</span>
              <select id="date-mode" name="dateMode">
                <option value="solar" selected>公历</option>
                <option value="lunar">农历</option>
              </select>
            </label>

            <label id="solar-date-row">
              <span>出生日期与时间</span>
              <input id="birth-datetime" name="birthDatetime" type="datetime-local" />
            </label>

            <div id="lunar-date-row" class="lunar-fields" hidden>
              <label>
                <span>农历年</span>
                <input id="lunar-year" name="lunarYear" type="number" min="1900" max="2100" />
              </label>
              <label>
                <span>农历月</span>
                <select id="lunar-month" name="lunarMonth">
                  <option value="1">正月</option>
                  <option value="2">二月</option>
                  <option value="3">三月</option>
                  <option value="4">四月</option>
                  <option value="5">五月</option>
                  <option value="6">六月</option>
                  <option value="7">七月</option>
                  <option value="8">八月</option>
                  <option value="9">九月</option>
                  <option value="10">十月</option>
                  <option value="11">十一月</option>
                  <option value="12">腊月</option>
                </select>
              </label>
              <label>
                <span>农历日</span>
                <select id="lunar-day" name="lunarDay"></select>
              </label>
              <label>
                <span>时间</span>
                <input id="lunar-time" name="lunarTime" type="time" />
              </label>
              <label class="switch-row lunar-leap-row">
                <input id="lunar-leap" name="lunarLeap" type="checkbox" />
                <span>闰月</span>
              </label>
            </div>
            <div id="date-hint" class="date-hint"></div>

            <label>
              <span>时区</span>
              <select name="timezone">
                <option value="480" selected>中国标准时间 UTC+08:00</option>
                <option value="540">日本/韩国 UTC+09:00</option>
                <option value="0">UTC+00:00</option>
                <option value="-300">美东 UTC-05:00</option>
                <option value="-360">美中 UTC-06:00</option>
                <option value="-420">美山 UTC-07:00</option>
                <option value="-480">美西 UTC-08:00</option>
              </select>
            </label>

            <label class="switch-row">
              <input name="ziHour" type="checkbox" checked />
              <span>按 23 点子时换日</span>
            </label>

            <div class="button-row">
              <button type="submit">排盘</button>
              <button id="fill-now" type="button" class="secondary">填入当前时间</button>
            </div>
          </form>

          <button id="copy-button" class="secondary" type="button" disabled>复制排盘数据</button>
          <section class="sidebar-section">
            <div class="section-title">
              <span>02</span>
              <strong>案例资产</strong>
            </div>
          </section>
          <label>
            <span>案例备注</span>
            <textarea id="case-note" rows="3" placeholder="可记录来访背景、验证点、断语摘要"></textarea>
          </label>
          <label>
            <span>案例标签</span>
            <input id="case-tags" type="text" placeholder="例如：事业, 婚恋, 已验证" />
          </label>
          <button id="save-case-button" class="secondary" type="button" disabled>保存案例</button>
          <section class="case-panel">
            <div class="case-heading">
              <h2>案例记录</h2>
              <span id="case-count">0</span>
            </div>
            <div id="case-list" class="case-list"></div>
          </section>
          <div id="error-view" class="error" hidden></div>
        </aside>

        <section class="result-panel">
          <div class="cosmic-plate" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
          <div id="chart-view" class="empty-state">
            <span class="intro-kicker">第一次使用可以先快速体验</span>
            <h2>从一张命盘开始，把判断留下来</h2>
            <p>输入出生信息后，系统会把四柱、流运、作用关系、神煞、案例记录和报告底稿放在同一个工作台里。</p>
            <div class="empty-actions">
              <button type="button" data-action="use-demo-chart">先看示例盘</button>
              <button class="secondary" type="button" data-action="use-current-chart">用当前时间排盘</button>
            </div>
            <p class="empty-note">示例不会自动保存，你可以随时换成真实资料。</p>
            <div class="empty-framework">
              <article>
                <strong>看盘面</strong>
                <span>四柱、藏干、十神、神煞一次展开</span>
              </article>
              <article>
                <strong>做核验</strong>
                <span>自动整理作用关系与核验问题</span>
              </article>
              <article>
                <strong>留记录</strong>
                <span>保存案例、复盘、生成报告底稿</span>
              </article>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
