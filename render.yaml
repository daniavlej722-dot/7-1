services:
  - type: web
    name: bazi-chart
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENROUTER_MODEL
        value: openai/gpt-oss-120b:free
      - key: OPENROUTER_API_KEY
        sync: false
